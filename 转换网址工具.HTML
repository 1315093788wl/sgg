<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Gitee HTML 预览转换工具</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body{
            background: #f5f5f5;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }
        .box{
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1{
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
        }
        textarea{
            width: 100%;
            height: 100px;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            resize: none;
            margin-bottom: 15px;
        }
        button{
            width: 100%;
            height: 45px;
            background: #4285f4;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        button:hover{
            background: #3367d6;
        }
        .result{
            padding: 12px;
            background: #e8f0fe;
            border-radius: 6px;
            word-break: break-all;
            font-size: 14px;
            margin-top: 10px;
            border: 1px solid #d3e3fd;
        }
        .tip{
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Gitee HTML 预览转换工具</h1>
        <p class="tip">粘贴你的 Gitee HTML 链接（blob 链接）：</p>
        <textarea id="inputLink" placeholder="例如：https://gitee.com/xxx/xxx/blob/master/xxx.html"></textarea>

        <button onclick="convert()">一键转换成可打开链接</button>

        <p class="tip">转换结果（可直接访问）：</p>
        <div class="result" id="result"></div>
    </div>

    <script>
        function convert() {
            let input = document.getElementById("inputLink").value.trim();
            if (!input) {
                alert("请粘贴链接");
                return;
            }

            // 把 blob 改成 raw
            let rawLink = input.replace("/blob/", "/raw/");
            
            // 加上预览前缀
            let finalLink = "https://htmlpreview.github.io/?" + rawLink;

            document.getElementById("result").innerText = finalLink;
        }
    </script>
</body>
</html>
