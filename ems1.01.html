<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国邮政实习生资费(职院区)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0, 80, 40, 0.15);
            overflow: hidden;
        }

        /* 头部样式 */
        .header {
            background: #00703c;
            padding: 28px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header svg {
            width: 36px;
            height: 36px;
            fill: #ffffff;
        }

        .header h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 600;
        }

        /* 表单区域 */
        .form-section {
            padding: 40px 50px;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #333333;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 12px;
        }

        /* 保费提示样式 */
        .insurance-tip {
            font-size: 14px;
            color: #ff6b6b;
            margin-top: 5px;
            font-weight: 400;
        }

        #region, #package-type {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 17px;
            background: #f9fafb;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        #region:focus, #package-type:focus, #insurance-value:focus {
            outline: none;
            border-color: #00703c;
            background: #ffffff;
        }

        .weight-input-wrapper, .insurance-input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #weight, #insurance-value {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 17px;
            background: #f9fafb;
            transition: all 0.2s ease;
        }

        .unit {
            color: #00703c;
            font-weight: 600;
            font-size: 18px;
        }

        #calculate-btn {
            width: 100%;
            padding: 16px;
            background: #00703c;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 19px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #calculate-btn:hover {
            background: #008547;
            transform: translateY(-2px);
        }

        /* 结果显示区域 */
        .result-section {
            padding: 0 50px 40px;
            display: none;
        }

        .result-card {
            border: 2px solid #00703c;
            border-radius: 12px;
            padding: 30px;
            background: #fafdfb;
        }

        .result-card h3 {
            color: #00703c;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #00703c;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 16px;
        }

        .info-row .label {
            color: #666666;
        }

        .info-row .value {
            color: #333333;
            font-weight: 500;
        }

        /* 包材/保费结果行样式 */
        .extra-row {
            border-top: 1px dashed #e5e7eb;
            padding-top: 12px;
            margin-top: 12px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #e5e7eb;
        }

        .price-row .label {
            color: #333333;
            font-size: 18px;
            font-weight: 600;
        }

        .price {
            color: #00703c;
            font-size: 38px;
            font-weight: bold;
        }

        /* 二维码区域 */
        .qrcode-section {
            padding: 0 50px 40px;
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .qrcode-card {
            flex: 1;
            min-width: 280px;
            max-width: 350px;
            border: 2px solid #00703c;
            border-radius: 12px;
            padding: 25px 20px;
            background: #ffffff;
            text-align: center;
            transition: all 0.2s ease;
        }

        .qrcode-card:hover {
            box-shadow: 0 4px 15px rgba(0, 112, 60, 0.2);
        }

        .qrcode-card h4 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #00703c;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .qrcode-card img {
            width: 100%;
            max-width: 260px;
            height: auto;
            border-radius: 8px;
        }

        /* 页脚署名 */
        .footer {
            width: 100%;
            max-width: 900px;
            margin-top: 15px;
            padding-right: 20px;
            text-align: right;
            font-size: 15px;
            color: #00703c;
            font-weight: 500;
        }

        /* 响应式适配 */
        @media (max-width: 650px) {
            .header h1 {
                font-size: 20px;
            }
            .form-section {
                padding: 30px 25px;
            }
            .result-section, .qrcode-section {
                padding: 0 25px 30px;
            }
            .price {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                <path d="M512 64C264.6 64 64 264.6 64 512s200.6 448 448 448 448-200.6 448-448S759.4 64 512 64zm0 820c-205.4 0-372-166.6-372-372s166.6-372 372-372 372 166.6 372 372-166.6 372-372 372z"/>
                <path d="M464 336a48 48 0 1 1 96 0 48 48 0 1 1-96 0zm72 112h-48c-4.4 0-8 3.6-8 8v272c0 4.4 3.6 8 8 8h48c4.4 0 8-3.6 8-8V456c0-4.4-3.6-8-8-8z"/>
            </svg>
            <h1>中国邮政实习生资费(职院区)</h1>
        </div>

        <!-- 表单区域 -->
        <div class="form-section">
            <div class="form-group">
                <label for="region">
                    <span>📦</span>
                    寄达区域
                </label>
                <select id="region">
                    <option value="" disabled selected>请选择寄达区域</option>
                    <option value="1">湖北省内</option>
                    
                    <option value="3">北京、天津、河北、山西、辽宁、福建、山东、广东、四川、广西、海南、宁夏、云南、甘肃、青海、上海、浙江、贵州、内蒙古</option>
                    <option value="4">吉林、黑龙江</option>
                    <option value="5">新疆</option>
                </select>
            </div>

            <div class="form-group">
                <label for="weight">
                    <span>⚖️</span>
                    包裹重量
                </label>
                <div class="weight-input-wrapper">
                    <input type="number" id="weight" step="0.1" min="0.1" placeholder="请输入重量">
                    <span class="unit">kg</span>
                </div>
            </div>

            <!-- 新增：包材选择 -->
            <div class="form-group">
                <label for="package-type">
                    <span>📦</span>
                    包材类型
                </label>
                <select id="package-type">
                    <option value="0" selected>不需要箱子（0元）</option>
                    <option value="3">小号箱子（3元）</option>
                    <option value="5">中号箱子（5元）</option>
                    <option value="6.5">大号箱子（6.5元）</option>
                </select>
            </div>

            <!-- 新增：保费输入 -->
            <div class="form-group">
                <label for="insurance-value">
                    <span>🔒</span>
                    保价金额（元）
                </label>
                <div class="insurance-input-wrapper">
                    <input type="number" id="insurance-value" step="1" min="0" placeholder="不需要保价请留空或输入0">
                    <span class="unit">元</span>
                </div>
                <div class="insurance-tip">提示：贵重物品一定要保价</div>
            </div>

            <button id="calculate-btn">
                <span>💰</span>
                计算资费
            </button>
        </div>

        <!-- 结果显示区域 -->
        <div class="result-section" id="result-section">
            <div class="result-card">
                <h3>📮 寄件信息</h3>
                
                <div class="info-row">
                    <span class="label">寄达路线：</span>
                    <span class="value" id="result-route"></span>
                </div>
                
                <div class="info-row">
                    <span class="label">包裹重量：</span>
                    <span class="value" id="result-weight"></span>
                </div>
                
                <div class="info-row">
                    <span class="label">首重价格：</span>
                    <span class="value" id="result-first"></span>
                </div>
                
                <div class="info-row">
                    <span class="label">续重价格：</span>
                    <span class="value" id="result-continue"></span>
                </div>

                <!-- 新增：包材费用结果 -->
                <div class="info-row extra-row">
                    <span class="label">包材费用：</span>
                    <span class="value" id="result-package"></span>
                </div>

                <!-- 新增：保费结果 -->
                <div class="info-row extra-row">
                    <span class="label">保价费用：</span>
                    <span class="value" id="result-insurance"></span>
                </div>

                <div class="price-row">
                    <span class="label">总资费：</span>
                    <span class="price" id="result-price"></span>
                </div>
            </div>
        </div>

        <!-- 二维码区域 -->
        <div class="qrcode-section">
            <div class="qrcode-card">
                <h4>
                    <span>📱</span>
                    邮费支付

    <div class="footer">
        By: Sugar Daddy of Li Zhihang
    </div>

    <script>
        // 区域资费配置
        const regionPricing = {
            1: { 
                name: '湖北省内', 
                firstWeight: 12, 
                continueWeight: 2,
                fullName: '湖北省内'
            },
            2: { 
                name: '中部六省', 
                firstWeight: 12, 
                continueWeight: 3,
                fullName: '江西、湖南、安徽、河南、重庆、陕西'
            },
            3: { 
                name: '主要省市', 
                firstWeight: 12, 
                continueWeight: 4,
                fullName: '北京、天津、河北、山西、辽宁、福建、山东、广东、四川、广西、海南、宁夏、云南、甘肃、青海、上海、江苏、浙江、贵州、内蒙古'
            },
            4: { 
                name: '东北及西藏', 
                firstWeight: 15, 
                continueWeight: 6,
                fullName: '西藏、吉林、黑龙江'
            },
            5: { 
                name: '新疆', 
                firstWeight: 15, 
                continueWeight: 10,
                fullName: '新疆'
            }
        };

        // DOM元素
        const regionSelect = document.getElementById('region');
        const weightInput = document.getElementById('weight');
        const packageTypeSelect = document.getElementById('package-type');
        const insuranceValueInput = document.getElementById('insurance-value');
        const calculateBtn = document.getElementById('calculate-btn');
        const resultSection = document.getElementById('result-section');
        const resultRoute = document.getElementById('result-route');
        const resultWeight = document.getElementById('result-weight');
        const resultFirst = document.getElementById('result-first');
        const resultContinue = document.getElementById('result-continue');
        const resultPackage = document.getElementById('result-package');
        const resultInsurance = document.getElementById('result-insurance');
        const resultPrice = document.getElementById('result-price');

        // 计算保费的函数
        function calculateInsurance(insuranceValue) {
            if (!insuranceValue || insuranceValue <= 0) {
                return 0;
            } else if (insuranceValue <= 500) {
                return 1;
            } else if (insuranceValue <= 1000) {
                return 2;
            } else {
                // 超过1000元按千分之5计算
                return Math.ceil(insuranceValue * 0.005);
            }
        }

        // 计算资费功能
        function calculatePostage() {
            const regionValue = regionSelect.value;
            const weight = parseFloat(weightInput.value);
            const packageFee = parseFloat(packageTypeSelect.value);
            const insuranceValue = parseFloat(insuranceValueInput.value) || 0;

            // 输入验证
            if (!regionValue) {
                alert('请先选择寄达区域！');
                regionSelect.focus();
                return;
            }

            if (isNaN(weight) || weight <= 0) {
                alert('请输入有效的重量（大于0）！');
                weightInput.focus();
                return;
            }

            // 基础运费计算
            const pricing = regionPricing[regionValue];
            const chargeWeight = Math.ceil(weight); // 向上取整计算计费重量
            let basePrice;
            if (chargeWeight <= 1) {
                basePrice = pricing.firstWeight;
            } else {
                basePrice = pricing.firstWeight + (chargeWeight - 1) * pricing.continueWeight;
            }

            // 计算保费
            const insuranceFee = calculateInsurance(insuranceValue);
            
            // 计算总费用
            const totalPrice = basePrice + packageFee + insuranceFee;

            // 填充结果
            resultRoute.textContent = `职院 → ${pricing.fullName}`;
            resultWeight.textContent = `${weight} kg（计费重量：${chargeWeight} kg）`;
            resultFirst.textContent = `${pricing.firstWeight} 元（首重1kg）`;
            resultContinue.textContent = `${pricing.continueWeight} 元/kg（续重）`;
            resultPackage.textContent = `¥ ${packageFee}（${packageTypeSelect.options[packageTypeSelect.selectedIndex].text}）`;
            resultInsurance.textContent = `¥ ${insuranceFee}（保价金额：¥ ${insuranceValue}）`;
            resultPrice.textContent = `¥ ${totalPrice}`;

            // 显示结果区域
            resultSection.style.display = 'block';
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 事件绑定
        calculateBtn.addEventListener('click', calculatePostage);
        weightInput.addEventListener('keypress', (e) => e.key === 'Enter' && calculatePostage());
        insuranceValueInput.addEventListener('keypress', (e) => e.key === 'Enter' && calculatePostage());
        regionSelect.addEventListener('change', () => resultSection.style.display = 'none');
        weightInput.addEventListener('input', () => resultSection.style.display = 'none');
        packageTypeSelect.addEventListener('change', () => resultSection.style.display = 'none');
        insuranceValueInput.addEventListener('input', () => resultSection.style.display = 'none');
    </script>
